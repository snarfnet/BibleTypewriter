name: BibleTypewriter
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  BibleTypewriter:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BibleTypewriter
        excludes:
          - Backgrounds
    resources:
      - path: BibleTypewriter/Backgrounds
      - path: BibleTypewriter/Assets.xcassets
      - path: BibleTypewriter/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_NAME: BibleTypewriter
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.bibletypewriter
        INFOPLIST_FILE: BibleTypewriter/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
