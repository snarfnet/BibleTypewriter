name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode 26
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Patch Info.plist build number
      run: |
        sed -i "" "s|<string>\$(CURRENT_PROJECT_VERSION)</string>|<string>$BUILD_NUM</string>|" BibleTypewriter/Info.plist
        sed -i "" "/<key>CFBundleVersion<\/key>/{n;s|<string>[^<]*</string>|<string>$BUILD_NUM</string>|;}" BibleTypewriter/Info.plist
        echo "Info.plist after patch:"
        grep -A1 CFBundleVersion BibleTypewriter/Info.plist

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Create Keychain and Distribution Certificate
      env:
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        ASC_KEY_ID: WDXGY9WX55
        ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        ASC_P8_PATH: /tmp/asc_key.p8
        REVOKE_EXISTING_DISTRIBUTION_CERTS: "1"
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        python3 scripts/create_distribution_certificate.py

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme BibleTypewriter \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/BibleTypewriter.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/BibleTypewriter.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Submit for Review
      env:
        ASC_KEY_ID: WDXGY9WX55
        ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        ASC_P8_PATH: /tmp/asc_key.p8
        APP_BUNDLE_ID: com.tokyonasu.bibletypewriter
        APP_VERSION: "1.0"
        BUILD_NUMBER: ${{ env.BUILD_NUM }}
      run: python3 scripts/submit_production.py
